apiVersion: v1
kind: Secret
metadata:
  name: db-secret   # name referenced in java-app.yaml
type: Opaque        # generic secret type (vs tls, dockerconfigjson etc)
data:
  db_user: bXktdXNlcg==                     # = "my-user"    (from mysql values file)
  db_pwd: bXktcGFzcw==                     # = "my-pass"    (from mysql values file)
  db_name: bXktYXBwLWRi                     # = "my-app-db"  (from mysql values file)
  db_root_pass: c2VjcmV0LXJvb3QtcGFzcw==    # = "secret-root-pass"  (from mysql values file)

  # to encode your own values:
  # echo -n "my-value" | base64